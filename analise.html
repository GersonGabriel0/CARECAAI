<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Envie sua foto e receba uma analise craniana avancada."
    >
    <title>Analisar | CarecAI</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><img src="assets/images/logocareque.jpeg" alt="CarecAI" class="brand-logo"><span class="brand-nome">CarequeIA</span></a>

      <nav aria-label="Navegacao principal">
        <a href="index.html">Inicio</a>
        <a href="galeria.html">Galeria</a>
        <a href="ranking.html">Ranking</a>
      </nav>

      <div class="header-actions">
        <a class="login-link" href="login.html">Entrar</a>
        <button class="theme-button" id="theme-button" type="button">
          Ativar Bald Mode
        </button>
      </div>
    </header>

    <main>
      <section class="panel" id="analisar">
        <div>
          <p class="eyebrow">CARECA LAB</p>
          <h2>Envie sua foto</h2>
          <p>O Gemini avalia a cobertura craniana e libera seu diagnostico.</p>
        </div>

        <label class="upload-area" for="photo">
          <strong>Escolher foto</strong>
          <span>JPG, PNG ou WEBP</span>
        </label>
        <div class="provider-grid provider-grid--analysis">
          <label class="input-label">
            IA para analisar
            <select id="analysis-provider">
              <option value="gemini">Gemini Lite</option>
              <option value="xai">Grok</option>
            </select>
          </label>
          <label class="input-label">
            IA para aplicar filtro
            <select id="filter-provider">
              <option value="xai">Grok Imagine</option>
              <option value="gemini">Gemini Image</option>
            </select>
          </label>
        </div>
        <input accept="image/*" id="photo" type="file">
        <div class="analysis-preview" id="analysis-preview" hidden>
          <img alt="Preview da foto enviada" id="analysis-image">
        </div>

        <button class="primary-button" id="analyze-button" type="button">
          Gerar analise
        </button>
        <p class="feedback" id="feedback"></p>
        <div class="bald-offer" id="analysis-bald-offer" hidden>
          <h3>Seu cabelo ainda oferece resistencia ao vento.</h3>
          <p>Deseja ativar o pacote executivo de aerodinamica craniana?</p>
          <button class="primary-button" id="analysis-bald-button" type="button">
            Aplicar modo careca turbo
          </button>
        </div>
      </section>
    </main>

    <footer>
      <p>CarecAI - Ciencia avancada para superficies brilhantes.</p>
    </footer>

    <script src="assets/js/nav.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
