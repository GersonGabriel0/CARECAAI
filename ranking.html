<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ranking das melhores carecas do CarecAI.">
    <title>Ranking | CarecAI</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><img src="assets/images/logocareque.jpeg" alt="CarecAI" class="brand-logo"><span class="brand-nome">CarequeIA</span></a>

      <nav aria-label="Navegacao principal">
        <a href="index.html">Inicio</a>
        <a href="galeria.html">Galeria</a>
        <a href="ranking.html" aria-current="page">Ranking</a>
      </nav>

      <div class="header-actions">
        <a class="login-link" href="login.html">Entrar</a>
        <button class="theme-button" id="theme-button" type="button" title="Ativar Bald Mode">
          <img class="theme-icon" src="assets/Careca.svg" alt="Ativar Bald Mode">
        </button>
      </div>
    </header>

    <main class="ranking-page">

      <div class="ranking-hero">
        <p class="eyebrow">HALL DA FAMA CRANIANA</p>
        <h1>Ranking de <span>Carecas</span></h1>
        <p>Carecas de um lado, calvos do outro. Cada um no seu lugar.</p>
      </div>

      <div class="ranking-split">

        <div class="ranking-lado ranking-lado--careca">
          <div class="ranking-lado-header">
            <span class="ranking-lado-emoji">🏆</span>
            <div>
              <h2 class="ranking-lado-titulo">Carecas Elite</h2>
              <p class="ranking-lado-sub">Score &ge; 80 pts</p>
            </div>
          </div>
          <ol class="ranking-lista" id="ranking-carecas">
            <li class="ranking-item ranking-skeleton"></li>
            <li class="ranking-item ranking-skeleton"></li>
            <li class="ranking-item ranking-skeleton"></li>
          </ol>
        </div>

        <div class="ranking-lado ranking-lado--calvo">
          <div class="ranking-lado-header">
            <span class="ranking-lado-emoji">🌱</span>
            <div>
              <h2 class="ranking-lado-titulo">Calvos em Evolucao</h2>
              <p class="ranking-lado-sub">Score &lt; 80 pts</p>
            </div>
          </div>
          <ol class="ranking-lista" id="ranking-calvos">
            <li class="ranking-item ranking-skeleton"></li>
            <li class="ranking-item ranking-skeleton"></li>
            <li class="ranking-item ranking-skeleton"></li>
          </ol>
        </div>

      </div>
    </main>

    <footer>
      <p>CarecAI &mdash; Ciencia avancada para superficies brilhantes.</p>
    </footer>

    <script src="assets/js/nav.js"></script>
    <script src="assets/js/ranking.js"></script>
    <script src="assets/js/bald-mode.js"></script>
  </body>
</html>
